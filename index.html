<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Смотрим вместе</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; }
    </style>
</head>
<body class="min-h-screen p-4">
    <div class="max-w-md mx-auto">

        <!-- Регистрация -->
        <div id="registerScreen">
            <div class="text-center py-12">
                <h1 class="text-4xl font-bold mb-2">Смотрим вместе</h1>
                <p class="text-gray-400">С друзьями</p>
            </div>
            
            <div class="space-y-6">
                <div>
                    <label class="block text-sm mb-2">Твой никнейм</label>
                    <input id="nickname" type="text" placeholder="Например: Котик228" 
                           class="w-full p-5 rounded-3xl bg-gray-800 text-xl">
                </div>
                
                <button id="startBtn" 
                        class="w-full bg-blue-600 hover:bg-blue-700 py-6 rounded-3xl text-2xl font-medium">
                    Начать
                </button>
            </div>
        </div>

        <!-- Главный экран -->
        <div id="mainScreen" class="hidden">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <p class="text-gray-400">Привет,</p>
                    <h1 id="greeting" class="text-3xl font-bold"></h1>
                </div>
                <div id="userNick" class="text-right"></div>
            </div>

            <div class="bg-gray-800 rounded-3xl p-6">
                <input id="roomInput" placeholder="ID комнаты" 
                       class="w-full p-5 rounded-3xl bg-gray-700 text-lg mb-4">
                <button id="joinRoomBtn" 
                        class="w-full bg-green-600 py-6 rounded-3xl text-xl font-medium">
                    Присоединиться к комнате
                </button>
            </div>

            <div class="mt-8 text-center text-gray-500">
                Скоро здесь будет плеер и чат
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
