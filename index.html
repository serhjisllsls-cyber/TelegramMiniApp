<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Firebase Галерея</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .photo-card { transition: transform 0.2s ease, box-shadow 0.2s ease; }
    .photo-card:hover { transform: translateY(-4px); }
    .dropzone { transition: all 0.2s ease; }
    .dropzone.dragover { border-color: #6366f1; background-color: #27251f; }
  </style>
</head>
<body class="bg-zinc-950 text-white">
  <div class="max-w-7xl mx-auto px-6 py-8">
    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-4xl font-semibold tracking-tight">Firebase Галерея</h1>
        <p class="text-zinc-400">Фото сохраняются навсегда</p>
      </div>
      <div class="flex items-center gap-x-3">
        <div class="px-4 py-1.5 bg-zinc-900 border border-zinc-700 rounded-2xl text-sm flex items-center gap-x-2">
          <span id="photo-count" class="font-semibold text-emerald-400">0</span>
          <span class="text-zinc-400">фото</span>
        </div>
        <button onclick="window.location.reload()" 
                class="px-4 py-1.5 bg-zinc-900 hover:bg-zinc-800 border border-zinc-700 rounded-2xl text-sm flex items-center gap-x-2">
          <i class="fa-solid fa-sync-alt mr-1"></i> Обновить
        </button>
      </div>
    </div>

    <!-- Upload -->
    <div id="dropzone" 
         class="dropzone border-2 border-dashed border-zinc-700 hover:border-indigo-500 bg-zinc-900 rounded-3xl p-10 text-center cursor-pointer mb-8">
      <i class="fa-solid fa-cloud-upload-alt text-5xl text-indigo-400 mb-4"></i>
      <h3 class="text-2xl font-semibold mb-1">Перетащите фото</h3>
      <p class="text-zinc-400">или нажмите для выбора</p>
      <input type="file" id="file-input" multiple accept="image/*" class="hidden">
    </div>

    <!-- Uploading -->
    <div id="uploading-section" class="hidden mb-6">
      <div class="text-sm font-semibold mb-2 px-1 text-zinc-400">Загрузка</div>
      <div id="uploading-list" class="space-y-2"></div>
    </div>

    <!-- Gallery -->
    <h2 class="font-semibold text-xl mb-4 px-1">Все фотографии</h2>
    <div id="gallery" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-5"></div>
  </div>

  <!-- Modal -->
  <div id="modal" onclick="if (event.target.id === 'modal') closeModal()" 
       class="hidden fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-6">
    <div onclick="event.stopImmediatePropagation()" class="bg-zinc-900 border border-zinc-700 w-full max-w-4xl rounded-3xl overflow-hidden">
      <div class="relative bg-black">
        <img id="modal-image" class="max-h-[70vh] w-full object-contain mx-auto" alt="">
        <button onclick="closeModal()" class="absolute top-4 right-4 w-10 h-10 bg-black/60 hover:bg-black/80 rounded-2xl flex items-center justify-center">
          <i class="fa-solid fa-times text-xl"></i>
        </button>
      </div>
      <div class="p-6 flex justify-between items-center border-t border-zinc-700">
        <div>
          <div id="modal-name" class="font-semibold text-xl"></div>
          <div id="modal-date" class="text-sm text-zinc-400"></div>
        </div>
        <div class="flex gap-x-3">
          <button onclick="deleteFromModal()" class="px-5 py-2 bg-red-600 hover:bg-red-700 rounded-2xl text-sm flex items-center gap-x-2">
            <i class="fa-solid fa-trash"></i> Удалить
          </button>
          <a id="modal-download" href="#" download class="px-5 py-2 bg-zinc-800 hover:bg-zinc-700 border border-zinc-600 rounded-2xl text-sm flex items-center gap-x-2">
            <i class="fa-solid fa-download"></i> Скачать
          </a>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container" class="fixed bottom-6 right-6 z-50 space-y-2"></div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBRJHXC5uDatuarJM8VbRXWdn9DPnmv2q8",
      authDomain: "test-d0571.firebaseapp.com",
      projectId: "test-d0571",
      storageBucket: "test-d0571.firebasestorage.app",
      messagingSenderId: "1052575818863",
      appId: "1:1052575818863:web:5931161b568b94b30e599a"
    };

    let db, storage;
    let currentModalPhoto = null;

    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `px-5 py-3 rounded-2xl text-sm font-medium shadow-xl ${type === 'success' ? 'bg-emerald-600' : 'bg-red-600'}`;
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 2800);
    }

    function createUploadItem(name, id) {
      const el = document.createElement('div');
      el.id = id;
      el.className = `flex items-center gap-x-4 bg-zinc-900 border border-zinc-700 px-5 py-3 rounded-2xl`;
      el.innerHTML = `
        <div class="flex-1">
          <div class="flex justify-between text-sm mb-1">
            <span class="truncate">${name}</span>
            <span id="${id}-percent" class="font-mono text-xs text-zinc-400">0%</span>
          </div>
          <div class="h-2 bg-zinc-800 rounded-full overflow-hidden">
            <div id="${id}-bar" class="h-2 bg-indigo-500 transition-all" style="width:0%"></div>
          </div>
        </div>
      `;
      return el;
    }

    function updateProgress(id, percent) {
      const bar = document.getElementById(id + '-bar');
      const p = document.getElementById(id + '-percent');
      if (bar) bar.style.width = percent + '%';
      if (p) p.textContent = Math.round(percent) + '%';
    }

    function removeUploadItem(id) {
      document.getElementById(id)?.remove();
      if (document.getElementById('uploading-list').children.length === 0) {
        document.getElementById('uploading-section').classList.add('hidden');
      }
    }

    function startUpload(file) {
      const id = 'u-' + Date.now();
      document.getElementById('uploading-section').classList.remove('hidden');
      document.getElementById('uploading-list').appendChild(createUploadItem(file.name, id));

      const ref = storage.ref(`photos/${Date.now()}-${file.name}`);
      const task = ref.put(file);

      task.on('state_changed',
        snap => updateProgress(id, (snap.bytesTransferred / snap.totalBytes) * 100),
        err => { showToast('Ошибка загрузки', 'error'); removeUploadItem(id); },
        async () => {
          const url = await task.snapshot.ref.getDownloadURL();
          await db.collection('photos').add({
            url,
            path: ref.fullPath,
            name: file.name,
            size: file.size,
            uploadedAt: firebase.firestore.FieldValue.serverTimestamp()
          });
          removeUploadItem(id);
          showToast('Фото загружено');
        }
      );
    }

    function handleFiles(files) {
      Array.from(files).forEach(f => {
        if (f.type.startsWith('image/')) startUpload(f);
      });
    }

    function renderGallery(photos) {
      const gallery = document.getElementById('gallery');
      gallery.innerHTML = '';

      if (photos.length === 0) {
        gallery.innerHTML = `<div class="col-span-full text-center py-16 text-zinc-400">Пока нет фото</div>`;
        return;
      }

      photos.forEach(photo => {
        const card = document.createElement('div');
        card.className = `photo-card group relative bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden`;

        const date = photo.uploadedAt?.toDate?.().toLocaleString('ru-RU', {day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'}) || '';

        card.innerHTML = `
          <img src="${photo.url}" class="w-full aspect-[4/3] object-cover cursor-pointer">
          <button class="delete-btn absolute top-3 right-3 px-3 py-1.5 bg-black/60 hover:bg-red-600 rounded-2xl text-sm opacity-0 group-hover:opacity-100 transition-all">
            <i class="fa-solid fa-trash"></i>
          </button>
          <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/90 p-4">
            <div class="font-semibold truncate">${photo.name}</div>
            <div class="text-xs text-emerald-400">${date}</div>
          </div>
        `;

        card.querySelector('img').onclick = () => openModal(photo);
        card.querySelector('.delete-btn').onclick = e => {
          e.stopImmediatePropagation();
          deletePhoto(photo);
        };
        gallery.appendChild(card);
      });
    }

    async function deletePhoto(photo) {
      if (!confirm('Удалить это фото?')) return;
      try {
        await storage.ref(photo.path).delete();
        await db.collection('photos').doc(photo.id).delete();
        showToast('Удалено');
      } catch (e) {
        showToast('Ошибка удаления', 'error');
      }
    }

    function openModal(photo) {
      currentModalPhoto = photo;
      document.getElementById('modal-image').src = photo.url;
      document.getElementById('modal-name').textContent = photo.name;
      document.getElementById('modal-date').textContent = photo.uploadedAt?.toDate?.().toLocaleString('ru-RU') || '';
      document.getElementById('modal-download').href = photo.url;
      document.getElementById('modal').classList.remove('hidden');
      document.getElementById('modal').classList.add('flex');
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
      document.getElementById('modal').classList.remove('flex');
    }

    function deleteFromModal() {
      if (currentModalPhoto) deletePhoto(currentModalPhoto);
      closeModal();
    }

    function setupRealtime() {
      db.collection('photos').orderBy('uploadedAt', 'desc').onSnapshot(snap => {
        const photos = [];
        snap.forEach(doc => photos.push({id: doc.id, ...doc.data()}));
        document.getElementById('photo-count').textContent = photos.length;
        renderGallery(photos);
      });
    }

    function initFirebase() {
      firebase.initializeApp(firebaseConfig);
      db = firebase.firestore();
      storage = firebase.storage();
      setupRealtime();
    }

    function setupDropzone() {
      const dz = document.getElementById('dropzone');
      const input = document.getElementById('file-input');

      dz.onclick = () => input.click();
      input.onchange = e => { handleFiles(e.target.files); e.target.value = ''; };

      dz.ondragover = e => { e.preventDefault(); dz.classList.add('dragover'); };
      dz.ondragleave = () => dz.classList.remove('dragover');
      dz.ondrop = e => { e.preventDefault(); dz.classList.remove('dragover'); handleFiles(e.dataTransfer.files); };
    }

    function start() {
      setupDropzone();
      initFirebase();
    }

    window.onload = start;
  </script>
</body>
</html>
