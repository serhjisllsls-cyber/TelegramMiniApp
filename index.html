<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Смотрим вместе</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-white p-4">
    <div class="max-w-md mx-auto">

        <!-- Экран авторизации -->
        <div id="authScreen">
            <div class="text-center py-10">
                <h1 class="text-4xl font-bold mb-2">Смотрим вместе</h1>
                <p class="text-gray-400">С друзьями</p>
            </div>

            <input id="nickname" type="text" placeholder="Никнейм" 
                   class="w-full p-5 rounded-3xl bg-gray-800 mb-4 text-lg">

            <input id="password" type="password" placeholder="Пароль" 
                   class="w-full p-5 rounded-3xl bg-gray-800 mb-6 text-lg">

            <div class="mb-6">
                <label class="block text-sm mb-2">Аватарка (необязательно)</label>
                <input id="avatarInput" type="file" accept="image/*" 
                       class="w-full bg-gray-800 p-3 rounded-3xl">
            </div>

            <div class="flex gap-3">
                <button id="loginBtn" 
                        class="flex-1 bg-blue-600 py-5 rounded-3xl text-lg font-medium">Войти</button>
                <button id="registerBtn" 
                        class="flex-1 bg-green-600 py-5 rounded-3xl text-lg font-medium">Регистрация</button>
            </div>
        </div>

        <!-- Главный экран -->
        <div id="mainScreen" class="hidden">
            <div class="flex justify-end items-center gap-3 mb-6">
                <img id="userAvatar" src="" alt="Аватар" 
                     class="w-10 h-10 rounded-full object-cover border-2 border-gray-600">
                <div id="userNick" class="text-right"></div>
            </div>

            <div class="bg-gray-800 rounded-3xl p-6 mb-6">
                <input id="searchUser" placeholder="Найти по никнейму..." 
                       class="w-full p-4 rounded-3xl bg-gray-700 text-lg">
                <button id="searchBtn" 
                        class="w-full mt-4 bg-indigo-600 py-4 rounded-3xl font-medium">
                    Найти и начать чат
                </button>
            </div>

            <!-- Чат -->
            <div id="chatScreen" class="hidden bg-gray-800 rounded-3xl p-6">
                <div id="chatHeader" class="flex justify-between items-center mb-4 pb-4 border-b border-gray-700 font-semibold"></div>
                
                <div id="chatMessages" class="h-80 overflow-y-auto mb-4 space-y-4"></div>
                
                <div class="flex gap-2">
                    <input id="chatInput" placeholder="Напишите сообщение..." 
                           class="flex-1 p-4 bg-gray-700 rounded-3xl">
                    <button id="sendMsgBtn" 
                            class="bg-blue-600 px-8 rounded-3xl font-medium">→</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
