<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Стена Признаний • Анонимно</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .confession-card {
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .confession-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
    }
  </style>
</head>
<body class="bg-zinc-950 text-white">
  <div class="max-w-2xl mx-auto px-6 py-10">
    <!-- Header -->
    <div class="text-center mb-10">
      <div class="flex justify-center mb-4">
        <div class="w-16 h-16 bg-zinc-800 rounded-2xl flex items-center justify-center">
          <i class="fa-solid fa-comments text-4xl text-zinc-400"></i>
        </div>
      </div>
      <h1 class="text-4xl font-semibold tracking-tight">Стена Признаний</h1>
      <p class="text-zinc-400 mt-2">Анонимно • В реальном времени</p>
      <div class="mt-4 inline-flex items-center gap-x-2 px-4 py-1.5 bg-zinc-900 border border-zinc-700 rounded-2xl text-sm">
        <span id="total-count" class="font-semibold text-emerald-400">0</span>
        <span class="text-zinc-400">признаний</span>
      </div>
    </div>

    <!-- Форма отправки -->
    <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-6 mb-8">
      <textarea id="message-input" 
                class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl p-4 text-lg resize-y min-h-[120px] focus:outline-none focus:border-zinc-500"
                placeholder="Напиши что-нибудь анонимно..."></textarea>
      
      <div class="flex justify-between items-center mt-4">
        <div class="text-xs text-zinc-500">Максимум 500 символов</div>
        <button onclick="sendConfession()"
                class="px-8 py-3 bg-white text-black font-semibold rounded-2xl hover:bg-zinc-200 transition-colors flex items-center gap-x-2">
          <i class="fa-solid fa-paper-plane"></i>
          <span>Отправить</span>
        </button>
      </div>
    </div>

    <!-- Список признаний -->
    <div class="space-y-4" id="confessions-list">
      <!-- JS заполнит -->
    </div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBRJHXC5uDatuarJM8VbRXWdn9DPnmv2q8",
      authDomain: "test-d0571.firebaseapp.com",
      projectId: "test-d0571",
      storageBucket: "test-d0571.firebasestorage.app",
      messagingSenderId: "1052575818863",
      appId: "1:1052575818863:web:5931161b568b94b30e599a"
    };

    let db;

    function initFirebase() {
      firebase.initializeApp(firebaseConfig);
      db = firebase.firestore();
      loadConfessions();
    }

    // Загрузка признаний в реальном времени
    function loadConfessions() {
      db.collection('confessions')
        .orderBy('createdAt', 'desc')
        .onSnapshot((snapshot) => {
          const list = document.getElementById('confessions-list');
          list.innerHTML = '';

          document.getElementById('total-count').textContent = snapshot.size;

          if (snapshot.empty) {
            list.innerHTML = `
              <div class="text-center py-12 text-zinc-400">
                <i class="fa-solid fa-inbox text-4xl mb-3 opacity-50"></i>
                <p>Пока нет признаний.<br>Стань первым!</p>
              </div>
            `;
            return;
          }

          snapshot.forEach(doc => {
            const data = doc.data();
            const card = createConfessionCard(doc.id, data);
            list.appendChild(card);
          });
        });
    }

    function createConfessionCard(id, data) {
      const div = document.createElement('div');
      div.className = `confession-card bg-zinc-900 border border-zinc-700 rounded-3xl p-6`;

      const date = data.createdAt?.toDate 
        ? data.createdAt.toDate().toLocaleString('ru-RU', { 
            day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' 
          }) 
        : 'только что';

      div.innerHTML = `
        <div class="text-lg leading-relaxed">${data.message}</div>
        
        <div class="flex items-center justify-between mt-5">
          <div class="text-xs text-zinc-500">${date}</div>
          
          <button onclick="likeConfession('${id}', this)"
                  class="flex items-center gap-x-2 px-4 py-1.5 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm transition-colors">
            <i class="fa-solid fa-heart text-red-400"></i>
            <span class="font-medium">${data.likes || 0}</span>
          </button>
        </div>
      `;
      return div;
    }

    // Отправка признания
    async function sendConfession() {
      const input = document.getElementById('message-input');
      const message = input.value.trim();

      if (!message) return;
      if (message.length > 500) {
        alert('Слишком длинное сообщение (максимум 500 символов)');
        return;
      }

      try {
        await db.collection('confessions').add({
          message: message,
          likes: 0,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        input.value = '';
      } catch (error) {
        console.error(error);
        alert('Ошибка отправки. Проверь правила Firestore.');
      }
    }

    // Лайк
    async function likeConfession(id, buttonElement) {
      const span = buttonElement.querySelector('span');
      let currentLikes = parseInt(span.textContent) || 0;

      // Оптимистичное обновление
      span.textContent = currentLikes + 1;

      try {
        await db.collection('confessions').doc(id).update({
          likes: firebase.firestore.FieldValue.increment(1)
        });
      } catch (error) {
        // Если ошибка — возвращаем старое значение
        span.textContent = currentLikes;
        console.error(error);
      }
    }

    // Обработка Enter
    function setupKeyboard() {
      const input = document.getElementById('message-input');
      input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendConfession();
        }
      });
    }

    function startApp() {
      initFirebase();
      setupKeyboard();
    }

    window.onload = startApp;
  </script>
</body>
</html>
