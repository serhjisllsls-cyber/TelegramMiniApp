<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Firebase Галерея • Фото хранятся навсегда</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
    
    body { font-family: 'Inter', system_ui, sans-serif; }
    .title-font { font-family: 'Space Grotesk', 'Inter', sans-serif; font-weight: 600; letter-spacing: -0.025em; }

    .photo-card { transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.2s cubic-bezier(0.4, 0.0, 0.2, 1); }
    .photo-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1); }
    .gallery-img { transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .photo-card:hover .gallery-img { transform: scale(1.05); }

    .dropzone { transition: all 0.2s cubic-bezier(0.4, 0.0, 0.2, 1); }
    .dropzone.dragover { background-color: rgb(63 66 87 / 0.3); border-color: #6366f1; transform: scale(1.01); }

    .modal { animation: modalPop 0.2s ease-out forwards; }
    @keyframes modalPop {
      from { opacity: 0; transform: scale(0.95) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
  </style>
</head>
<body class="bg-zinc-950 text-white">
  <div class="max-w-7xl mx-auto px-6 py-8">
    <!-- Header -->
    <div class="flex items-center justify-between mb-10">
      <div class="flex items-center gap-x-4">
        <div class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-inner">
          <i class="fa-solid fa-images text-white text-3xl"></i>
        </div>
        <div>
          <h1 class="title-font text-4xl font-semibold tracking-tighter">Firebase Галерея</h1>
          <p class="text-zinc-400 text-sm">Фото хранятся навсегда • Даже после перезапуска</p>
        </div>
      </div>
      
      <div class="flex items-center gap-x-3">
        <div class="px-4 py-2 bg-zinc-900 border border-zinc-800 rounded-2xl flex items-center gap-x-2 text-sm">
          <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
          <span id="photo-count" class="font-semibold text-emerald-400">0</span>
          <span class="text-zinc-400">фото</span>
        </div>
        
        <button onclick="window.location.reload()" 
                class="px-4 py-2 bg-zinc-900 hover:bg-zinc-800 border border-zinc-700 rounded-2xl text-sm flex items-center gap-x-2 transition-colors">
          <i class="fa-solid fa-sync-alt"></i>
          <span>Обновить</span>
        </button>
      </div>
    </div>

    <!-- Upload Zone -->
    <div id="dropzone"
         class="dropzone border-2 border-dashed border-zinc-700 hover:border-indigo-500 bg-zinc-900/50 rounded-3xl p-10 text-center cursor-pointer mb-6 transition-all">
      <div class="mx-auto w-16 h-16 bg-zinc-800 rounded-2xl flex items-center justify-center mb-5">
        <i class="fa-solid fa-cloud-upload-alt text-4xl text-indigo-400"></i>
      </div>
      <h3 class="text-2xl font-semibold mb-1">Перетащите фото сюда</h3>
      <p class="text-zinc-400 mb-4">или нажмите для выбора файлов</p>
      <div class="inline-flex items-center gap-x-2 text-xs px-4 py-1.5 bg-zinc-800 rounded-2xl text-zinc-400">
        <i class="fa-solid fa-image"></i>
        <span>PNG, JPG, WEBP • до 20 МБ</span>
      </div>
      
      <input type="file" id="file-input" multiple accept="image/*" class="hidden">
    </div>

    <!-- Uploading list -->
    <div id="uploading-section" class="mb-8 hidden">
      <div class="flex items-center gap-x-2 mb-3 px-1">
        <i class="fa-solid fa-spinner fa-spin text-indigo-400"></i>
        <span class="font-semibold text-sm tracking-wider">ЗАГРУЗКА</span>
      </div>
      <div id="uploading-list" class="space-y-2"></div>
    </div>

    <!-- Gallery -->
    <div class="mb-4 flex items-center justify-between px-1">
      <h2 class="font-semibold text-xl tracking-tight">Все фотографии</h2>
      <div class="text-xs px-3 py-1 bg-zinc-900 rounded-2xl text-zinc-400 border border-zinc-800">
        Хранится в Firebase
      </div>
    </div>

    <div id="gallery" 
         class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 2xl:grid-cols-6 gap-5 min-h-[420px]">
    </div>
  </div>

  <!-- Modal -->
  <div id="modal" onclick="if (event.target.id === 'modal') closeModal()" 
       class="hidden fixed inset-0 bg-black/90 z-50 items-center justify-center p-6">
    <div onclick="event.stopImmediatePropagation()" 
         class="bg-zinc-900 border border-zinc-700 w-full max-w-4xl rounded-3xl overflow-hidden shadow-2xl">
      
      <div class="relative bg-black flex items-center justify-center" style="min-height: 420px; max-height: 70vh;">
        <img id="modal-image" class="max-h-[70vh] w-auto max-w-full object-contain" alt="">
        <button onclick="closeModal()" 
                class="absolute top-4 right-4 w-10 h-10 bg-black/60 hover:bg-black/80 text-white rounded-2xl flex items-center justify-center transition-colors">
          <i class="fa-solid fa-times text-xl"></i>
        </button>
      </div>
      
      <div class="p-6 flex items-center justify-between gap-4 border-t border-zinc-700 bg-zinc-900">
        <div class="min-w-0 flex-1">
          <div id="modal-name" class="font-semibold text-xl truncate"></div>
          <div id="modal-date" class="text-sm text-zinc-400 mt-0.5"></div>
        </div>
        
        <div class="flex items-center gap-x-3">
          <button onclick="deleteFromModal()" 
                  class="flex items-center gap-x-2 px-5 py-2.5 bg-red-600 hover:bg-red-700 transition-colors text-white text-sm font-medium rounded-2xl">
            <i class="fa-solid fa-trash"></i>
            <span>Удалить</span>
          </button>
          
          <a id="modal-download" href="#" download 
             class="flex items-center gap-x-2 px-5 py-2.5 bg-zinc-800 hover:bg-zinc-700 border border-zinc-600 transition-colors text-sm font-medium rounded-2xl">
            <i class="fa-solid fa-download"></i>
            <span>Скачать</span>
          </a>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container" class="fixed bottom-6 right-6 z-[999] flex flex-col gap-2"></div>

  <!-- Firebase Compat Scripts -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

  <script>
    // ==================== ТВОЙ FIREBASE КОНФИГ ====================
    const firebaseConfig = {
      apiKey: "AIzaSyBRJHXC5uDatuarJM8VbRXWdn9DPnmv2q8",
      authDomain: "test-d0571.firebaseapp.com",
      projectId: "test-d0571",
      storageBucket: "test-d0571.firebasestorage.app",
      messagingSenderId: "1052575818863",
      appId: "1:1052575818863:web:5931161b568b94b30e599a"
    };
    // ============================================================

    let db, storage;
    let currentModalPhoto = null;

    function isFirebaseConfigured() {
      return firebaseConfig.apiKey && !firebaseConfig.apiKey.includes('YOUR');
    }

    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      const colors = type === 'success' ? 'bg-emerald-600' : 'bg-red-600';
      
      toast.className = `flex items-center gap-x-3 px-5 py-3.5 rounded-2xl shadow-2xl text-sm font-medium text-white ${colors}`;
      toast.innerHTML = `
        <i class="fa-solid ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'} text-lg ml-1"></i>
        <span>${message}</span>
      `;
      container.appendChild(toast);
      setTimeout(() => {
        toast.style.transition = 'all 0.25s ease';
        toast.style.opacity = '0';
        setTimeout(() => toast.remove(), 200);
      }, 3000);
    }

    function createUploadItem(fileName, uploadId) {
      const div = document.createElement('div');
      div.id = uploadId;
      div.className = `flex items-center gap-x-4 bg-zinc-900 border border-zinc-700 px-5 py-3.5 rounded-2xl`;
      div.innerHTML = `
        <div class="flex-1 min-w-0">
          <div class="flex items-center justify-between mb-1.5">
            <span class="text-sm font-medium truncate pr-4">${fileName}</span>
            <span id="${uploadId}-percent" class="text-xs tabular-nums text-zinc-400 font-mono w-9 text-right">0%</span>
          </div>
          <div class="h-2 bg-zinc-800 rounded-full overflow-hidden">
            <div id="${uploadId}-bar" class="h-2 bg-indigo-500 transition-all duration-150 rounded-full" style="width: 0%"></div>
          </div>
        </div>
      `;
      return div;
    }

    function updateUploadProgress(uploadId, percent) {
      const bar = document.getElementById(`${uploadId}-bar`);
      const percentEl = document.getElementById(`${uploadId}-percent`);
      if (bar) bar.style.width = `${percent}%`;
      if (percentEl) percentEl.textContent = `${Math.round(percent)}%`;
    }

    function removeUploadItem(uploadId) {
      const el = document.getElementById(uploadId);
      if (el) el.remove();
      const list = document.getElementById('uploading-list');
      if (list.children.length === 0) {
        document.getElementById('uploading-section').classList.add('hidden');
      }
    }

    function startUpload(file) {
      if (!storage || !db) return showToast('Firebase не готов', 'error');

      const uploadId = 'upload-' + Date.now();
      const uploadingList = document.getElementById('uploading-list');
      document.getElementById('uploading-section').classList.remove('hidden');
      uploadingList.appendChild(createUploadItem(file.name, uploadId));

      const timestamp = Date.now();
      const safeName = file.name.replace(/[^a-zA-Z0-9.-]/g, '_');
      const storageRef = storage.ref(`photos/${timestamp}-${safeName}`);
      const uploadTask = storageRef.put(file);

      uploadTask.on('state_changed',
        (snapshot) => {
          const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
          updateUploadProgress(uploadId, progress);
        },
        (error) => {
          showToast('Ошибка загрузки', 'error');
          removeUploadItem(uploadId);
        },
        async () => {
          try {
            const downloadURL = await uploadTask.snapshot.ref.getDownloadURL();
            await db.collection('photos').add({
              url: downloadURL,
              path: storageRef.fullPath,
              name: file.name,
              size: file.size,
              uploadedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            removeUploadItem(uploadId);
            showToast('Фото добавлено');
          } catch (err) {
            showToast('Ошибка сохранения', 'error');
            removeUploadItem(uploadId);
          }
        }
      );
    }

    function handleFiles(files) {
      Array.from(files).forEach(file => {
        if (!file.type.startsWith('image/')) return showToast('Только изображения', 'error');
        if (file.size > 20 * 1024 * 1024) return showToast('Файл слишком большой', 'error');
        startUpload(file);
      });
    }

    function renderGallery(photos) {
      const gallery = document.getElementById('gallery');
      gallery.innerHTML = '';

      if (photos.length === 0) {
        gallery.innerHTML = `
          <div class="col-span-full flex flex-col items-center justify-center py-16 text-center border border-zinc-800 rounded-3xl bg-zinc-900/40">
            <div class="text-7xl mb-5 opacity-30">🖼️</div>
            <p class="text-2xl font-semibold tracking-tight text-zinc-300">Пока нет фотографий</p>
            <p class="text-zinc-500 mt-2">Загрузите первое фото</p>
          </div>`;
        return;
      }

      photos.forEach(photo => {
        const card = document.createElement('div');
        card.className = `photo-card group relative bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden shadow-xl`;

        let dateStr = 'только что';
        if (photo.uploadedAt?.toDate) {
          dateStr = photo.uploadedAt.toDate().toLocaleString('ru-RU', {
            day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit'
          });
        }

        card.innerHTML = `
          <div class="relative">
            <img src="${photo.url}" class="gallery-img w-full aspect-[4/3] object-cover cursor-pointer">
            <button class="delete-btn absolute top-3 right-3 w-9 h-9 bg-black/60 hover:bg-red-600 text-white rounded-2xl flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all z-20">
              <i class="fa-solid fa-trash text-sm"></i>
            </button>
            <div class="absolute inset-x-0 bottom-0 bg-gradient-to-t from-black/90 via-black/70 to-transparent px-4 pt-9 pb-4">
              <div class="text-white font-semibold text-[15px] truncate pr-8">${photo.name}</div>
              <div class="text-emerald-400 text-xs mt-px">${dateStr}</div>
            </div>
          </div>
        `;

        card.querySelector('img').onclick = () => openModal(photo);
        card.querySelector('.delete-btn').onclick = (e) => {
          e.stopImmediatePropagation();
          deletePhoto(photo);
        };

        gallery.appendChild(card);
      });
    }

    async function deletePhoto(photo) {
      if (!confirm(`Удалить «${photo.name}»?`)) return;
      try {
        if (photo.path) await storage.ref(photo.path).delete();
        await db.collection('photos').doc(photo.id).delete();
        showToast('Фото удалено');
      } catch (e) {
        showToast('Не удалось удалить', 'error');
      }
    }

    function openModal(photo) {
      currentModalPhoto = photo;
      const modal = document.getElementById('modal');
      document.getElementById('modal-image').src = photo.url;
      document.getElementById('modal-name').textContent = photo.name || 'Без названия';
      
      let dateStr = '';
      if (photo.uploadedAt?.toDate) {
        dateStr = photo.uploadedAt.toDate().toLocaleString('ru-RU', {
          day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit'
        });
      }
      document.getElementById('modal-date').textContent = dateStr;
      document.getElementById('modal-download').href = photo.url;

      modal.classList.remove('hidden');
      modal.classList.add('flex');
    }

    function closeModal() {
      const modal = document.getElementById('modal');
      modal.classList.remove('flex');
      modal.classList.add('hidden');
    }

    function deleteFromModal() {
      if (currentModalPhoto) deletePhoto(currentModalPhoto);
      closeModal();
    }

    function setupRealtimeListener() {
      db.collection('photos')
        .orderBy('uploadedAt', 'desc')
        .onSnapshot((snapshot) => {
          const photos = [];
          snapshot.forEach(doc => photos.push({ id: doc.id, ...doc.data() }));
          document.getElementById('photo-count').textContent = photos.length;
          renderGallery(photos);
        });
    }

    async function initFirebase() {
      if (!isFirebaseConfigured()) {
        alert('Ошибка: firebaseConfig не заполнен');
        return;
      }

      firebase.initializeApp(firebaseConfig);
      db = firebase.firestore();
      storage = firebase.storage();

      await firebase.auth().signInAnonymously();
      setupRealtimeListener();
    }

    function setupDropzone() {
      const dropzone = document.getElementById('dropzone');
      const fileInput = document.getElementById('file-input');

      dropzone.addEventListener('click', () => fileInput.click());
      fileInput.addEventListener('change', e => {
        if (e.target.files.length) handleFiles(e.target.files);
        e.target.value = '';
      });

      dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
      dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
      dropzone.addEventListener('drop', e => {
        e.preventDefault();
        dropzone.classList.remove('dragover');
        if (e.dataTransfer.files.length) handleFiles(e.dataTransfer.files);
      });
    }

    function startApp() {
      setupDropzone();
      initFirebase();

      document.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
          const modal = document.getElementById('modal');
          if (!modal.classList.contains('hidden')) closeModal();
        }
      });
    }

    window.onload = startApp;
  </script>
</body>
</html>
