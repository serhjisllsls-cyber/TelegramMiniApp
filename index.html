<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#160d15">
    <title>Мы вместе ❤️</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>
    <div class="photo-backdrop" aria-hidden="true"></div>
    <div class="ambient ambient--one" aria-hidden="true"></div>
    <div class="ambient ambient--two" aria-hidden="true"></div>

    <button class="menu-button" id="menuButton" type="button" aria-label="Открыть меню" aria-expanded="false" aria-controls="sidebar">
        <img src="images/menu.jpg" alt="">
        <span class="menu-button__icon" aria-hidden="true"><i></i><i></i></span>
    </button>

    <div id="overlay" aria-hidden="true"></div>

    <aside class="sidebar" id="sidebar" aria-hidden="true">
        <div class="sidebar__top">
            <div class="profile">
                <img src="images/menu.jpg" class="avatar" alt="Наша фотография">
                <div>
                    <span class="profile-kicker">НАША ИСТОРИЯ</span>
                    <div class="profile-name">Мы вместе</div>
                </div>
            </div>
            <button class="close-button" id="closeMenuButton" type="button" aria-label="Закрыть меню">×</button>
        </div>

        <nav class="menu" aria-label="Навигация">
            <button class="menu-item menu-item--active" type="button">
                <span class="menu-item__icon">♥</span>
                <span>Главная</span>
            </button>
            <button class="menu-item" type="button">
                <span class="menu-item__icon">⌁</span>
                <span>Дата знакомства</span>
            </button>
            <button class="menu-item" type="button">
                <span class="menu-item__icon">◌</span>
                <span>Наши фотографии</span>
            </button>
            <button class="menu-item" type="button">
                <span class="menu-item__icon">✦</span>
                <span>Годовщины</span>
            </button>
        </nav>

        <p class="sidebar-note">Каждый день с тобой — мой любимый.</p>
    </aside>

    <main class="container">
        <section class="love-card" aria-labelledby="pageTitle">
            <div class="card-shine" aria-hidden="true"></div>

            <header class="card-header">
                <span class="eyebrow"><span class="eyebrow__heart">♥</span> НАШЕ ВРЕМЯ ВМЕСТЕ</span>
                <h1 id="pageTitle">Мы вместе</h1>
            </header>

            <div class="counter" aria-live="polite">
                <div id="days" class="days">0</div>
                <div class="counter-caption">счастливых дней рядом</div>
            </div>

            <div class="card-divider"><span>✦</span></div>

            <footer class="card-footer">
                <span>Наша история началась</span>
                <time id="sinceDate" datetime="2025-07-15">15 июля 2025</time>
            </footer>
        </section>

        <p class="love-note">И пусть это будет только началом <span>♥</span></p>
    </main>

    <script src="app.js"></script>
</body>
</html>
