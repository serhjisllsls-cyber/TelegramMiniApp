<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Смотрим вместе</title>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-900 text-white">
  <div class="max-w-4xl mx-auto p-4">
    <button id="loginBtn" class="bg-blue-600 px-6 py-3 rounded">Войти через Google</button>
    
    <div id="main" class="hidden">
      <video id="player" controls class="w-full max-h-[70vh] bg-black"></video>
      
      <div class="flex gap-4 mt-4">
        <input id="roomInput" placeholder="ID комнаты" class="flex-1 p-3 bg-gray-800 rounded">
        <button id="joinBtn" class="bg-green-600 px-6 py-3 rounded">Присоединиться / Создать</button>
      </div>
      
      <div id="chat" class="h-64 overflow-y-auto bg-gray-800 p-4 mt-4 rounded"></div>
      <div class="flex mt-2">
        <input id="chatInput" placeholder="Сообщение..." class="flex-1 p-3 bg-gray-800 rounded-l">
        <button id="sendBtn" class="bg-blue-600 px-6 rounded-r">Отправить</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
