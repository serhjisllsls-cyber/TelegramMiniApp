<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSS</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-white p-4">
    <div class="max-w-md mx-auto">

        <!-- Auth Screen -->
        <div id="authScreen">
            <div class="text-center py-10">
                <h1 class="text-4xl font-bold">Вход</h1>
            </div>
            <input id="nickname" type="text" placeholder="Никнейм" class="w-full p-5 rounded-3xl bg-gray-800 mb-4 text-lg">
            <input id="password" type="password" placeholder="Пароль" class="w-full p-5 rounded-3xl bg-gray-800 mb-6 text-lg">
            
            <div class="mb-6">
                <label class="block text-sm mb-2">Аватарка</label>
                <input id="avatarInput" type="file" accept="image/*" class="w-full bg-gray-800 p-3 rounded-3xl">
            </div>

            <div class="flex gap-3">
                <button id="loginBtn" class="flex-1 bg-blue-600 py-5 rounded-3xl text-lg">Войти</button>
                <button id="registerBtn" class="flex-1 bg-green-600 py-5 rounded-3xl text-lg">Регистрация</button>
            </div>
        </div>

        <!-- Main Screen -->
        <div id="mainScreen" class="hidden">
            <div class="flex justify-end items-center gap-3 mb-8">
                <img id="userAvatar" src="https://via.placeholder.com/40" alt="Аватар" 
                     class="w-10 h-10 rounded-full object-cover border-2 border-gray-600">
                <div id="userNick" class="text-right"></div>
            </div>

            <div class="text-center py-12">
                <h2 id="greeting" class="text-3xl font-bold"></h2>
            </div>

            <div class="bg-gray-800 rounded-3xl p-8 text-center text-gray-400">
                Здесь скоро будет плеер и чат
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
