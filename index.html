<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Смотрим вместе</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; }
        input { background: #1e2937; }
    </style>
</head>
<body class="min-h-screen p-4">
    <div class="max-w-md mx-auto">

        <!-- Экран регистрации -->
        <div id="registerScreen">
            <div class="text-center py-12">
                <h1 class="text-4xl font-bold mb-2">Смотрим вместе</h1>
                <p class="text-gray-400">С друзьями</p>
            </div>

            <div class="space-y-6">
                <div>
                    <label class="block text-sm mb-2">Никнейм</label>
                    <input id="nickname" type="text" placeholder="Как тебя зовут?" 
                           class="w-full p-4 rounded-2xl text-lg">
                </div>

                <div>
                    <label class="block text-sm mb-2">Номер телефона</label>
                    <input id="phone" type="tel" placeholder="+7 999 123 45 67" 
                           class="w-full p-4 rounded-2xl text-lg">
                </div>

                <button id="sendCodeBtn"
                        class="w-full bg-blue-600 hover:bg-blue-700 py-5 rounded-2xl text-xl font-medium">
                    Получить код
                </button>
            </div>
        </div>

        <!-- Экран ввода кода -->
        <div id="codeScreen" class="hidden">
            <div class="text-center py-12">
                <h2 class="text-2xl font-bold">Введи код из SMS</h2>
            </div>
            <input id="verificationCode" type="text" maxlength="6" placeholder="123456"
                   class="w-full p-6 text-4xl text-center tracking-widest rounded-3xl bg-gray-800">
            <button id="verifyCodeBtn"
                    class="w-full mt-6 bg-green-600 hover:bg-green-700 py-5 rounded-2xl text-xl">
                Подтвердить
            </button>
        </div>

        <!-- Главный экран после входа -->
        <div id="mainScreen" class="hidden">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <p class="text-gray-400 text-sm">Привет,</p>
                    <h1 id="greeting" class="text-3xl font-bold"></h1>
                </div>
                <div id="userNick" class="text-right">
                    <!-- Никнейм здесь -->
                </div>
            </div>

            <div class="bg-gray-800 rounded-3xl p-6 mb-6">
                <input id="roomInput" placeholder="ID комнаты" 
                       class="w-full p-4 rounded-2xl bg-gray-700 text-lg mb-4">
                <button id="joinRoomBtn" 
                        class="w-full bg-green-600 py-5 rounded-2xl text-xl font-medium">
                    Присоединиться
                </button>
            </div>

            <!-- Здесь будет плеер и чат позже -->
            <div class="text-center text-gray-500 py-12">
                Выбери комнату и смотри синхронно с друзьями
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
