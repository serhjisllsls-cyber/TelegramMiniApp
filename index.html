<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SecureFace">
    <meta name="theme-color" content="#000000">
    <title>SRC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=SF+Pro+Display:wght@400;500;600&amp;display=swap');
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", system-ui, sans-serif;
        }
        
        .ios-bg { background: #000000; }
        
        .ios-card {
            background: #1C1C1E;
            border-radius: 20px;
        }
        
        .face-id-button {
            transition: all 0.2s cubic-bezier(0.23, 1, 0.32, 1);
            background: linear-gradient(145deg, #0A84FF, #007AFF);
            box-shadow: 0 4px 15px rgba(10, 132, 255, 0.3);
        }
        
        .face-id-button:active {
            transform: scale(0.985);
            box-shadow: 0 2px 8px rgba(10, 132, 255, 0.4);
        }
        
        .face-id-button:disabled {
            background: #3A3A3C;
            box-shadow: none;
        }
        
        .lock-screen {
            background: linear-gradient(180deg, #000000 0%, #0A0A0A 100%);
        }
        
        .scan-animation {
            position: relative;
            overflow: hidden;
        }
        
        .scan-line {
            position: absolute;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(to right, transparent 0%, #0A84FF 20%, #0A84FF 80%, transparent 100%);
            box-shadow: 0 0 12px #0A84FF;
            animation: scan 1.8s ease-in-out infinite;
            z-index: 10;
        }
        
        @keyframes scan {
            0% { top: 15%; }
            50% { top: 85%; }
            100% { top: 15%; }
        }
        
        .main-content {
            animation: fadeInUp 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .ios-toast {
            animation: toastIn 0.3s ease forwards;
        }
        
        .section-header {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: #8E8E93;
        }
        
        .safe-area {
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }
        
        .status-bar { height: 44px; background: #000; }
        
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        
        .photo-item {
            aspect-ratio: 1;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            background: #2C2C2E;
            cursor: pointer;
        }
        
        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .photo-delete {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 26px;
            height: 26px;
            background: rgba(0,0,0,0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
        }
        
        .photo-modal img {
            max-height: 80vh;
            border-radius: 16px;
        }
    </style>
</head>
<body class="ios-bg text-white min-h-screen overflow-x-hidden">
    <!-- LOCK SCREEN -->
    <div id="lock-screen" class="min-h-screen flex flex-col safe-area">
        <div class="status-bar flex items-center justify-center px-6 pt-2">
            <div class="w-16 h-1 bg-white/30 rounded-full"></div>
        </div>
        
        <div class="flex-1 flex flex-col items-center justify-center px-8">
            <div class="mb-8">
                <div class="w-20 h-20 mx-auto rounded-2xl bg-gradient-to-br from-[#0A84FF] to-[#007AFF] flex items-center justify-center shadow-2xl shadow-blue-500/30">
                    <i class="fa-solid fa-shield-halved text-white text-4xl"></i>
                </div>
            </div>
            
            <div class="text-center mb-3">
                <h1 class="text-4xl font-semibold tracking-tight">TEST</h1>
                <p class="text-[#8E8E93] text-lg mt-1">TEST 2</p>
            </div>
            
            <div class="my-8 relative">
                <div id="face-scan-area" class="w-40 h-40 mx-auto rounded-[32px] border-[6px] border-[#3A3A3C] bg-[#1C1C1E] flex items-center justify-center relative overflow-hidden scan-animation">
                    <div class="relative z-20">
                        <div class="w-20 h-20 rounded-full border-[3.5px] border-[#0A84FF]/70 flex items-center justify-center">
                            <div class="flex gap-5 mt-[-6px]">
                                <div class="w-[9px] h-[9px] bg-[#0A84FF] rounded-full"></div>
                                <div class="w-[9px] h-[9px] bg-[#0A84FF] rounded-full"></div>
                            </div>
                            <div class="absolute bottom-[18px] left-1/2 -translate-x-1/2 w-6 h-[5px] border-b-[2.5px] border-[#0A84FF]/70 rounded-full"></div>
                        </div>
                    </div>
                    <div id="scan-line" class="scan-line hidden" style="top: 15%;"></div>
                </div>
            </div>
            
            <div class="text-center mb-10">
                <h2 class="text-2xl font-semibold tracking-tight">Авторизация по Face ID</h2>
                <p class="text-[#8E8E93] mt-2 max-w-[260px]">Face ID</p>
            </div>
            
            <button id="face-btn" onclick="handleFaceIDAuth()"
                    class="face-id-button w-full max-w-[320px] py-4 px-8 rounded-2xl text-white font-semibold text-[17px] flex items-center justify-center gap-x-3 active:scale-[0.985]">
                <i class="fa-solid fa-face-smile text-xl"></i>
                <span id="btn-text">Войти по Face ID</span>
            </button>
            
            <div class="mt-4 text-center">
                <p class="text-xs text-[#8E8E93]">ID</p>
            </div>
        </div>
        
        <div class="px-8 pb-8 text-center">
            <p class="text-[11px] text-[#8E8E93]">TEST</p>
        </div>
    </div>
    
    <!-- MAIN APP -->
    <div id="main-app" class="hidden min-h-screen flex flex-col safe-area ios-bg">
        <div class="sticky top-0 z-50 bg-black/90 backdrop-blur-xl border-b border-white/10">
            <div class="px-5 pt-3 pb-2 flex items-center justify-between">
                <div class="flex items-center gap-x-2">
                    <div class="w-8 h-8 rounded-xl bg-gradient-to-br from-[#0A84FF] to-[#007AFF] flex items-center justify-center">
                        <i class="fa-solid fa-shield-halved text-white text-sm"></i>
                    </div>
                    <span class="font-semibold text-xl tracking-tight">SecureFace</span>
                </div>
                <button onclick="logout()" class="px-4 py-2 text-sm font-medium text-[#0A84FF] active:opacity-70">Выйти</button>
            </div>
        </div>
        
        <div class="px-5 pt-6 pb-8 flex-1">
            <!-- Welcome (clean, no name) -->
            <div class="mb-6">
                <h1 class="text-3xl font-semibold tracking-tight">Добро пожаловать</h1>
                <p class="text-[#8E8E93] mt-1">Face ID успешно подтверждён</p>
            </div>
            
            <!-- Status -->
            <div class="ios-card p-5 mb-8 shadow-xl">
                <div class="flex items-center gap-x-3">
                    <i class="fa-solid fa-check-circle text-green-500 text-2xl"></i>
                    <div>
                        <div class="font-semibold">Face ID активен</div>
                        <div class="text-xs text-[#8E8E93]">Доступ защищён биометрией</div>
                    </div>
                </div>
            </div>
            
            <!-- PHOTOS GALLERY -->
            <div>
                <div class="flex items-center justify-between mb-3 px-1">
                    <div>
                        <div class="section-header">Мои фотографии</div>
                        <div class="text-xs text-[#8E8E93]">Шифрование</div>
                    </div>
                    <button onclick="triggerPhotoUpload()" 
                            class="px-4 py-2 bg-[#0A84FF] text-white text-sm font-semibold rounded-2xl flex items-center gap-x-2 active:opacity-90">
                        <i class="fa-solid fa-plus"></i>
                        <span>Добавить</span>
                    </button>
                </div>
                
                <input type="file" id="photo-input" accept="image/*" multiple class="hidden" onchange="handlePhotoUpload(event)">
                
                <div id="photo-grid" class="photo-grid"></div>
                
                <div id="no-photos" class="hidden text-center py-10 text-[#8E8E93]">
                    <i class="fa-solid fa-images text-4xl mb-3"></i>
                    <p>Нет фотографий.<br>Добавить фото</p>
                </div>
            </div>
        </div>
        
        <div class="px-5 pb-6">
            <div onclick="resetAllData()" class="text-center py-3 text-xs text-[#8E8E93] active:text-red-400 cursor-pointer">
                Сбросить все данные
            </div>
        </div>
    </div>
    
    <!-- Photo Modal -->
    <div id="photo-modal" onclick="closePhotoModal()" class="hidden fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-4">
        <div onclick="event.stopImmediatePropagation()" class="w-full max-w-[90%]">
            <div class="flex justify-end mb-3">
                <button onclick="closePhotoModal()" class="text-white/70 px-4 py-1"><i class="fa-solid fa-times text-2xl"></i></button>
            </div>
            <div class="flex justify-center">
                <img id="modal-image" class="max-h-[75vh] w-auto rounded-3xl shadow-2xl" alt="">
            </div>
            <div class="mt-5 text-center">
                <button onclick="deleteCurrentPhoto()" class="px-6 py-2.5 bg-red-500/90 text-white rounded-2xl text-sm font-medium flex items-center gap-x-2 mx-auto">
                    <i class="fa-solid fa-trash"></i>
                    <span>Удалить фото</span>
                </button>
            </div>
        </div>
    </div>
    
    <div id="toast" class="hidden fixed bottom-8 left-1/2 -translate-x-1/2 px-5 py-3 bg-[#1C1C1E] border border-white/10 rounded-3xl shadow-2xl max-w-[280px] z-[200]">
        <div class="flex items-center gap-x-3 text-sm">
            <i id="toast-icon" class="fa-solid fa-info-circle text-[#0A84FF]"></i>
            <span id="toast-text" class="font-medium"></span>
        </div>
    </div>
    
    <script>
        // ==================== DATA ====================
        let photos = [];
        let currentPhotoIndex = null;
        
        function loadData() {
            try {
                photos = JSON.parse(localStorage.getItem('sf_photos') || '[]');
            } catch(e) { photos = []; }
        }
        
        function saveData() {
            localStorage.setItem('sf_photos', JSON.stringify(photos));
        }
        
        // ==================== PHOTOS ====================
        function renderPhotos() {
            const grid = document.getElementById('photo-grid');
            const noPhotos = document.getElementById('no-photos');
            grid.innerHTML = '';
            
            if (photos.length === 0) {
                noPhotos.classList.remove('hidden');
                return;
            }
            noPhotos.classList.add('hidden');
            
            photos.forEach((photo, index) => {
                const div = document.createElement('div');
                div.className = 'photo-item';
                div.innerHTML = `
                    <img src="${photo.dataUrl}" alt="">
                    <div class="photo-delete" onclick="event.stopImmediatePropagation(); deletePhoto(${index});">
                        <i class="fa-solid fa-trash text-xs"></i>
                    </div>
                `;
                div.onclick = () => openPhotoModal(index);
                grid.appendChild(div);
            });
        }
        
        function triggerPhotoUpload() {
            document.getElementById('photo-input').click();
        }
        
        function handlePhotoUpload(e) {
            const files = Array.from(e.target.files || []);
            if (files.length === 0) return;
            
            let added = 0;
            const max = 30;
            
            files.forEach(file => {
                if (photos.length >= max) {
                    showToast("Лимит 30 фото. Удалите старые.", "error");
                    return;
                }
                if (!file.type.startsWith('image/')) return;
                
                const reader = new FileReader();
                reader.onload = (ev) => {
                    photos.unshift({
                        id: Date.now() + Math.random(),
                        dataUrl: ev.target.result,
                        name: file.name,
                        date: new Date().toISOString()
                    });
                    added++;
                    if (added === files.length) {
                        saveData();
                        renderPhotos();
                        showToast(`Добавлено ${added} фото`);
                    }
                };
                reader.readAsDataURL(file);
            });
            e.target.value = '';
        }
        
        function openPhotoModal(index) {
            currentPhotoIndex = index;
            const modal = document.getElementById('photo-modal');
            const img = document.getElementById('modal-image');
            img.src = photos[index].dataUrl;
            modal.style.display = 'flex';
            modal.classList.remove('hidden');
        }
        
        function closePhotoModal() {
            const modal = document.getElementById('photo-modal');
            modal.style.display = 'none';
            modal.classList.add('hidden');
            currentPhotoIndex = null;
        }
        
        function deletePhoto(index) {
            if (!confirm('Удалить фото?')) return;
            photos.splice(index, 1);
            saveData();
            renderPhotos();
            closePhotoModal();
        }
        
        function deleteCurrentPhoto() {
            if (currentPhotoIndex !== null) deletePhoto(currentPhotoIndex);
        }
        
        function resetAllData() {
            if (!confirm('Сбросить все фото?')) return;
            localStorage.removeItem('sf_photos');
            photos = [];
            renderPhotos();
            showToast('Данные сброшены');
        }
        
        // ==================== REAL WEBAUTHN FACE ID ====================
        function bufferToBase64(buffer) {
            return btoa(String.fromCharCode.apply(null, new Uint8Array(buffer)));
        }
        
        function base64ToBuffer(base64) {
            const binary = atob(base64);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
            return bytes.buffer;
        }
        
        async function isPlatformAuthenticatorAvailable() {
            if (!window.PublicKeyCredential) return false;
            try {
                return await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
            } catch {
                return false;
            }
        }
        
        async function registerPasskey() {
            const challenge = crypto.getRandomValues(new Uint8Array(32));
            const userId = crypto.getRandomValues(new Uint8Array(16));
            
            const options = {
                publicKey: {
                    challenge,
                    rp: { name: "SecureFace", id: window.location.hostname || "localhost" },
                    user: { id: userId, name: "user@secureface.app", displayName: "User" },
                    pubKeyCredParams: [{ type: "public-key", alg: -7 }],
                    authenticatorSelection: {
                        authenticatorAttachment: "platform",
                        userVerification: "required",
                        residentKey: "required"
                    },
                    timeout: 60000
                }
            };
            
            try {
                const cred = await navigator.credentials.create(options);
                if (cred) {
                    localStorage.setItem('sf_cred_id', bufferToBase64(cred.rawId));
                    return true;
                }
            } catch (e) {
                console.warn("Register error:", e);
            }
            return false;
        }
        
        async function authenticateWithPasskey() {
            const credIdB64 = localStorage.getItem('sf_cred_id');
            if (!credIdB64) return false;
            
            const allowCredentials = [{ id: base64ToBuffer(credIdB64), type: "public-key" }];
            const challenge = crypto.getRandomValues(new Uint8Array(32));
            
            const options = {
                publicKey: {
                    challenge,
                    rpId: window.location.hostname || "localhost",
                    allowCredentials,
                    userVerification: "required",
                    timeout: 60000
                }
            };
            
            try {
                const assertion = await navigator.credentials.get(options);
                return !!assertion;
            } catch (e) {
                console.warn("Auth error:", e);
                return false;
            }
        }
        
        async function simulateFaceID() {
            return new Promise(resolve => setTimeout(() => resolve(true), 1350));
        }
        
        let isProcessing = false;
        
        async function handleFaceIDAuth() {
            if (isProcessing) return;
            isProcessing = true;
            
            const btn = document.getElementById('face-btn');
            const btnText = document.getElementById('btn-text');
            const scanLine = document.getElementById('scan-line');
            const scanArea = document.getElementById('face-scan-area');
            
            btn.disabled = true;
            btnText.textContent = "Сканирование...";
            scanLine.classList.remove('hidden');
            scanArea.style.borderColor = '#0A84FF';
            scanArea.style.boxShadow = '0 0 0 8px rgba(10,132,255,0.2)';
            
            let success = false;
            const hasCred = !!localStorage.getItem('sf_cred_id');
            const supported = await isPlatformAuthenticatorAvailable();
            
            try {
                if (supported) {
                    if (!hasCred) {
                        success = await registerPasskey();
                    } else {
                        success = await authenticateWithPasskey();
                    }
                } else {
                    success = await simulateFaceID();
                    if (!hasCred) localStorage.setItem('sf_cred_id', 'simulated-' + Date.now());
                }
            } catch (e) {
                success = await simulateFaceID();
            }
            
            scanLine.classList.add('hidden');
            scanArea.style.borderColor = '#3A3A3C';
            scanArea.style.boxShadow = 'none';
            
            if (success) {
                localStorage.setItem('sf_authenticated', 'true');
                btnText.textContent = "Успешно!";
                btn.style.background = 'linear-gradient(145deg, #30D158, #34C759)';
                
                setTimeout(() => {
                    unlockApp();
                }, 380);
            } else {
                showToast("Face ID не подтверждён. Попробуйте снова.", "error");
                setTimeout(() => {
                    btn.disabled = false;
                    btnText.textContent = "Войти по Face ID";
                    btn.style.background = 'linear-gradient(145deg, #0A84FF, #007AFF)';
                    isProcessing = false;
                }, 1100);
            }
        }
        
        function unlockApp() {
            const lock = document.getElementById('lock-screen');
            const app = document.getElementById('main-app');
            
            lock.style.transition = 'opacity 0.35s ease, transform 0.35s ease';
            lock.style.opacity = '0';
            lock.style.transform = 'translateY(-12px)';
            
            setTimeout(() => {
                lock.style.display = 'none';
                app.style.display = 'flex';
                app.classList.add('main-content');
                
                loadData();
                renderPhotos();
            }, 320);
        }
        
        function logout() {
            localStorage.removeItem('sf_authenticated');
            const app = document.getElementById('main-app');
            const lock = document.getElementById('lock-screen');
            
            app.style.transition = 'opacity 0.25s ease';
            app.style.opacity = '0';
            
            setTimeout(() => {
                app.style.display = 'none';
                app.style.opacity = '1';
                lock.style.display = 'flex';
                lock.style.opacity = '1';
                lock.style.transform = 'none';
                
                const btn = document.getElementById('face-btn');
                const btnText = document.getElementById('btn-text');
                btn.disabled = false;
                btnText.textContent = "Войти по Face ID";
                btn.style.background = 'linear-gradient(145deg, #0A84FF, #007AFF)';
                isProcessing = false;
            }, 220);
        }
        
        function showToast(message, type = "info") {
            const toast = document.getElementById('toast');
            const text = document.getElementById('toast-text');
            const icon = document.getElementById('toast-icon');
            
            text.textContent = message;
            icon.className = type === "error" 
                ? "fa-solid fa-exclamation-circle text-red-400" 
                : "fa-solid fa-info-circle text-[#0A84FF]";
            
            toast.classList.remove('hidden');
            toast.style.opacity = '1';
            
            setTimeout(() => {
                toast.style.transition = 'all 0.3s ease';
                toast.style.opacity = '0';
                setTimeout(() => {
                    toast.classList.add('hidden');
                    toast.style.transition = '';
                    toast.style.opacity = '1';
                }, 250);
            }, 2300);
        }
        
        function initializeApp() {
            // Auto-unlock if already authenticated persistently
            if (localStorage.getItem('sf_authenticated') === 'true') {
                const lock = document.getElementById('lock-screen');
                const app = document.getElementById('main-app');
                lock.style.display = 'none';
                app.style.display = 'flex';
                
                loadData();
                renderPhotos();
            }
            
            // Keyboard test
            document.addEventListener('keydown', e => {
                if (e.key === "/" && document.getElementById('lock-screen').style.display !== 'none') {
                    e.preventDefault();
                    document.getElementById('face-btn').click();
                }
            });
            
            // Long press on face area
            const faceArea = document.getElementById('face-scan-area');
            if (faceArea) {
                let timer;
                faceArea.addEventListener('touchstart', () => {
                    timer = setTimeout(() => {
                        if (!isProcessing && document.getElementById('lock-screen').style.display !== 'none') {
                            document.getElementById('face-btn').click();
                        }
                    }, 850);
                });
                faceArea.addEventListener('touchend', () => clearTimeout(timer));
            }
            
            console.log('%c[SecureFace] Готово. Реальный Face ID + persistent фото.', 'color:#666');
        }
        
        window.onload = initializeApp;
    </script>
</body>
</html>
