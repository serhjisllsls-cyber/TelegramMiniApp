<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Смотрим вместе</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #111827; color: white; }
        #player { width: 100%; max-height: 70vh; background: black; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-5xl mx-auto">
        <!-- Login -->
        <div id="loginScreen">
            <h1 class="text-4xl font-bold text-center my-12">Смотрим вместе 🎬</h1>
            <button id="loginBtn" 
                    class="block mx-auto bg-blue-600 hover:bg-blue-700 px-10 py-5 rounded-2xl text-xl">
                Войти через Google
            </button>
        </div>

        <!-- Main -->
        <div id="mainApp" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-3xl font-bold">Смотрим вместе</h1>
                <button id="logoutBtn" class="text-red-500">Выйти</button>
            </div>

            <video id="player" controls class="w-full rounded-3xl mb-6"></video>

            <div class="bg-gray-800 p-6 rounded-3xl mb-6">
                <input id="roomInput" placeholder="ID комнаты" class="w-full p-4 bg-gray-700 rounded-2xl mb-4">
                <button id="joinRoomBtn" class="w-full bg-green-600 py-4 rounded-2xl text-lg">Присоединиться</button>
            </div>

            <div id="fileSelector" class="hidden bg-gray-800 p-6 rounded-3xl mb-6">
                <button id="pickFileBtn" class="w-full bg-indigo-600 py-4 rounded-2xl">Выбрать видео из Drive</button>
                <div id="selectedFile" class="mt-3 text-center"></div>
            </div>

            <div class="bg-gray-800 p-6 rounded-3xl">
                <h3 class="mb-4 font-bold">💬 Чат</h3>
                <div id="chatMessages" class="h-72 overflow-y-auto mb-4"></div>
                <div class="flex gap-2">
                    <input id="chatInput" placeholder="Напиши сообщение..." class="flex-1 p-4 bg-gray-700 rounded-2xl">
                    <button id="sendChatBtn" class="bg-blue-600 px-8 rounded-2xl">Отправить</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
