<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Смотрим вместе</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; }
    </style>
</head>
<body class="min-h-screen p-4">
    <div class="max-w-md mx-auto">

        <!-- Экран входа/регистрации -->
        <div id="authScreen">
            <div class="text-center py-10">
                <h1 class="text-4xl font-bold">Смотрим вместе</h1>
            </div>

            <div class="space-y-6">
                <input id="nickname" type="text" placeholder="Никнейм" 
                       class="w-full p-5 rounded-3xl bg-gray-800 text-lg">

                <input id="password" type="password" placeholder="Пароль" 
                       class="w-full p-5 rounded-3xl bg-gray-800 text-lg">

                <div class="flex gap-4">
                    <button id="loginBtn" 
                            class="flex-1 bg-blue-600 py-5 rounded-3xl text-lg">Войти</button>
                    <button id="registerBtn" 
                            class="flex-1 bg-green-600 py-5 rounded-3xl text-lg">Регистрация</button>
                </div>
            </div>
        </div>

        <!-- Главный экран -->
        <div id="mainScreen" class="hidden">
            <div class="flex justify-end mb-8">
                <div id="userNick" class="text-right"></div>
            </div>

            <div class="text-center py-12">
                <h2 id="greeting" class="text-3xl font-bold"></h2>
            </div>

            <div class="bg-gray-800 rounded-3xl p-8 text-center text-gray-400">
                Здесь будет плеер, чат и комнаты
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
